# Claude Code Damage Control - Security Patterns
# Adapted from disler/claude-code-damage-control
# Three-tier protection: zeroAccess > readOnly > noDelete

# =============================================================================
# DANGEROUS BASH COMMANDS - Block or Ask
# =============================================================================
bashPatterns:
  # --- FILE DESTRUCTION ---
  # NOTE: rm -rf targeting build caches (.next, node_modules, dist, target, build,
  # __pycache__, .turbo, .parcel-cache, .cache, .tsbuildinfo) is always ALLOWED.
  # The safe-target allowlist in damage-control.sh short-circuits before this pattern.
  - pattern: "rm\\s+(-[^\\s]*)?-[rf]"
    description: "rm with recursive or force flags (except build caches)"
    action: block

  - pattern: "rmdir\\s+--ignore-fail-on-non-empty"
    description: "rmdir ignoring non-empty"
    action: block

  # --- PERMISSIONS ---
  - pattern: "chmod\\s+777"
    description: "chmod 777 (world-writable)"
    action: block

  - pattern: "chown\\s+(-R|--recursive)\\s+root"
    description: "recursive chown to root"
    action: block

  # --- GIT DESTRUCTIVE ---
  - pattern: "git\\s+reset\\s+--hard"
    description: "git reset --hard (loses uncommitted changes)"
    action: block

  - pattern: "git\\s+clean\\s+-[fd]"
    description: "git clean (removes untracked files)"
    action: block

  - pattern: "git\\s+push.*--force([^-]|$)"
    description: "git push --force (use --force-with-lease instead)"
    action: block

  - pattern: "git\\s+push.*\\s-f([^o]|$)"
    description: "git push -f (use --force-with-lease instead)"
    action: block

  - pattern: "git\\s+checkout\\s+\\.\\s*$"
    description: "git checkout . (discards all uncommitted changes)"
    action: block

  - pattern: "git\\s+restore\\s+\\.\\s*$"
    description: "git restore . (discards all uncommitted changes)"
    action: block

  - pattern: "git\\s+stash\\s+clear"
    description: "git stash clear (loses all stashes)"
    action: block

  # --- GIT RISKY (ASK) ---
  - pattern: "git\\s+branch\\s+-[dD]"
    description: "delete git branch"
    action: ask

  - pattern: "git\\s+stash\\s+drop"
    description: "drop a git stash"
    action: ask

  - pattern: "git\\s+push.*origin\\s+(main|master)\\b"
    description: "push directly to main/master branch"
    action: ask

  # --- CLOUD INFRASTRUCTURE ---
  - pattern: "aws\\s+ec2\\s+terminate-instances"
    description: "AWS EC2 terminate"
    action: block

  - pattern: "aws\\s+rds\\s+delete-db"
    description: "AWS RDS delete"
    action: block

  - pattern: "aws\\s+s3\\s+rb.*--force"
    description: "AWS S3 bucket force delete"
    action: block

  - pattern: "gcloud.*delete"
    description: "GCP delete operation"
    action: ask

  - pattern: "az\\s+.*\\s+delete"
    description: "Azure delete operation"
    action: ask

  # --- INFRASTRUCTURE AS CODE ---
  - pattern: "terraform\\s+destroy"
    description: "terraform destroy"
    action: block

  - pattern: "pulumi\\s+destroy"
    description: "pulumi destroy"
    action: block

  # --- KUBERNETES ---
  - pattern: "kubectl\\s+delete\\s+namespace"
    description: "kubectl delete namespace"
    action: block

  - pattern: "kubectl\\s+delete.*--all"
    description: "kubectl delete all resources"
    action: block

  # --- DOCKER ---
  - pattern: "docker\\s+system\\s+prune\\s+-a"
    description: "docker system prune all"
    action: ask

  - pattern: "docker\\s+rm\\s+-f.*\\$\\(docker\\s+ps"
    description: "docker remove all containers"
    action: block

  # --- DATABASES ---
  - pattern: "DROP\\s+DATABASE"
    description: "DROP DATABASE"
    action: block
    caseSensitive: false

  - pattern: "DROP\\s+TABLE"
    description: "DROP TABLE"
    action: ask
    caseSensitive: false

  - pattern: "TRUNCATE\\s+TABLE"
    description: "TRUNCATE TABLE"
    action: ask
    caseSensitive: false

  - pattern: "DELETE\\s+FROM\\s+\\w+\\s*;?$"
    description: "DELETE without WHERE clause"
    action: block
    caseSensitive: false

  - pattern: "DELETE\\s+FROM.*WHERE"
    description: "DELETE with WHERE clause"
    action: ask
    caseSensitive: false

  # --- REDIS ---
  - pattern: "redis-cli.*FLUSHALL"
    description: "Redis FLUSHALL"
    action: block

  - pattern: "redis-cli.*FLUSHDB"
    description: "Redis FLUSHDB"
    action: ask

  # --- PACKAGE MANAGERS ---
  - pattern: "npm\\s+unpublish"
    description: "npm unpublish"
    action: block

  - pattern: "cargo\\s+yank"
    description: "cargo yank"
    action: ask

# =============================================================================
# ZERO ACCESS PATHS - Block ALL operations (read/write/edit/delete)
# These contain secrets/credentials
# =============================================================================
zeroAccessPaths:
  # Environment files
  - ".env"
  - ".env.*"
  - "*.env"

  # SSH keys
  - "~/.ssh/"
  - ".ssh/"
  - "*.pem"
  - "*.key"
  - "id_rsa*"
  - "id_ed25519*"

  # GPG
  - "~/.gnupg/"
  - ".gnupg/"

  # Cloud credentials
  - "~/.aws/"
  - ".aws/"
  - "~/.config/gcloud/"
  - "~/.azure/"
  - "~/.kube/config"

  # Terraform state (contains secrets)
  - "*.tfstate"
  - "*.tfstate.*"

  # Platform tokens
  - ".npmrc"
  - ".pypirc"
  - ".docker/config.json"
  - ".netrc"

  # Certificates
  - "*.p12"
  - "*.pfx"
  - "*.cer"
  - "*secret*.json"
  - "*credential*.json"
  - "*token*.json"

# =============================================================================
# READ-ONLY PATHS - Allow read, block modifications
# System and configuration files
# =============================================================================
readOnlyPaths:
  # System directories
  - "/etc/"
  - "/usr/"
  - "/System/"

  # Shell config (read for reference, don't modify)
  - "~/.bash_history"
  - "~/.zsh_history"

  # Lock files
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "Cargo.lock"
  - "poetry.lock"
  - "Gemfile.lock"

  # Build artifacts
  - "node_modules/"
  - "target/"
  - "dist/"
  - ".next/"
  - "__pycache__/"

# =============================================================================
# NO-DELETE PATHS - Allow read/write/edit, block deletion
# Critical project files
# =============================================================================
noDeletePaths:
  # Documentation
  - "README.md"
  - "LICENSE"
  - "CHANGELOG.md"

  # Git
  - ".git/"
  - ".gitignore"
  - ".gitattributes"

  # Configuration
  - "Dockerfile"
  - "docker-compose.yml"
  - "Makefile"
  - "Cargo.toml"
  - "package.json"
  - "tsconfig.json"

  # Claude Code
  - ".claude/"
  - "CLAUDE.md"

# =============================================================================
# SECRET DETECTION - Block/warn when secrets appear in content
# Applied to tool_input content during PreToolUse
# =============================================================================
secretDetection:
  - name: "AWS Access Key"
    pattern: "AKIA[A-Z0-9]{16}"
    action: block
    message: "Potential AWS access key detected in content"

  - name: "GitHub Token"
    pattern: "gh[pousr]_[A-Za-z0-9_]{36,}"
    action: block
    message: "Potential GitHub token detected in content"

  - name: "OpenAI API Key"
    pattern: "sk-[a-zA-Z0-9]{20,}"
    action: block
    message: "Potential OpenAI API key detected in content"

  - name: "JWT Token"
    pattern: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}"
    action: warn
    message: "Potential JWT detected in content"

  - name: "Private Key"
    pattern: "-----BEGIN.*PRIVATE KEY-----"
    action: block
    message: "Private key content detected"

  - name: "Anthropic API Key"
    pattern: "sk-ant-[a-zA-Z0-9_-]{20,}"
    action: block
    message: "Potential Anthropic API key detected in content"

  - name: "Stripe Secret Key"
    pattern: "sk_live_[a-zA-Z0-9]{20,}"
    action: block
    message: "Potential Stripe secret key detected in content"

  - name: "Stripe Publishable Key"
    pattern: "pk_live_[a-zA-Z0-9]{20,}"
    action: warn
    message: "Potential Stripe publishable key detected in content"

  - name: "Slack Token"
    pattern: "xox[bpras]-[A-Za-z0-9-]{10,}"
    action: block
    message: "Potential Slack token detected in content"

  - name: "GCP Service Account"
    pattern: "\"type\"\\s*:\\s*\"service_account\""
    action: block
    message: "Potential GCP service account JSON detected"

  - name: "Azure Connection String"
    pattern: "DefaultEndpointsProtocol=https?;Account"
    action: block
    message: "Potential Azure storage connection string detected"

  - name: "GitLab Token"
    pattern: "glpat-[A-Za-z0-9_-]{20,}"
    action: block
    message: "Potential GitLab personal access token detected"

  - name: "Generic Secret"
    pattern: "(secret|password|api_key)\\s*[:=]\\s*[\"'][^\"']{8,}"
    action: warn
    message: "Potential hardcoded secret detected"

# =============================================================================
# SENSITIVE PATHS - Additional path-based restrictions
# Complements zeroAccessPaths with content-aware warnings
# =============================================================================
sensitivePaths:
  - pattern: "\\.env($|\\.)"
    action: block
    message: "Modifying .env files is restricted"

  - pattern: "credentials"
    action: warn
    message: "Modifying credential files requires caution"

  - pattern: "\\.pem$"
    action: block
    message: "Modifying PEM certificate files is restricted"

  - pattern: "\\.key$"
    action: block
    message: "Modifying key files is restricted"

  - pattern: "id_rsa"
    action: block
    message: "Modifying SSH key files is restricted"
